<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="headerGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.08);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.03);stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.2);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.05);stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="transparent" rx="12"/>

  <!-- Header -->
  <rect x="20" y="20" width="760" height="70" fill="url(#headerGradient)" rx="16" filter="url(#shadow)"/>
  <text x="400" y="65" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="26" font-weight="bold">
    六大核心服务模块
  </text>

  <!-- Service Cards Container -->
  <g transform="translate(40, 110)">

    <!-- Row 1 -->
    <!-- IngestionService -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="220" height="140" fill="url(#cardGradient)" stroke="url(#cardBorder)" stroke-width="1" rx="16" filter="url(#shadow)"/>
      <circle cx="30" cy="30" r="12" fill="#10b981"/>
      <text x="50" y="25" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
        智能文档摄取服务
      </text>
      <text x="50" y="40" fill="#9ca3af" font-family="Arial, sans-serif" font-size="12">
        IngestionService
      </text>
      <text x="15" y="65" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">
        • 文档解析与预处理
      </text>
      <text x="15" y="80" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">
        • 多格式文档支持
      </text>
      <text x="15" y="95" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">
        • 智能内容提取
      </text>
      <text x="15" y="110" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">
        • 批量处理能力
      </text>
    </g>

    <!-- RetrievalService -->
    <g transform="translate(240, 0)">
      <rect x="0" y="0" width="220" height="140" fill="url(#cardGradient)" stroke="url(#cardBorder)" stroke-width="1" rx="16" filter="url(#shadow)"/>
      <circle cx="30" cy="30" r="12" fill="#3b82f6"/>
      <text x="50" y="25" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
        混合检索服务
      </text>
      <text x="50" y="40" fill="#9ca3af" font-family="Arial, sans-serif" font-size="12">
        RetrievalService
      </text>
      <text x="15" y="65" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">
        • 向量检索技术
      </text>
      <text x="15" y="80" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">
        • 关键词匹配
      </text>
      <text x="15" y="95" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">
        • 语义理解检索
      </text>
      <text x="15" y="110" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">
        • 混合排序算法
      </text>
    </g>

    <!-- GraphService -->
    <g transform="translate(480, 0)">
      <rect x="0" y="0" width="220" height="140" fill="url(#cardGradient)" stroke="url(#cardBorder)" stroke-width="1" rx="16" filter="url(#shadow)"/>
      <circle cx="30" cy="30" r="12" fill="#8b5cf6"/>
      <text x="50" y="25" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
        知识图谱服务
      </text>
      <text x="50" y="40" fill="#9ca3af" font-family="Arial, sans-serif" font-size="12">
        GraphService
      </text>
      <text x="15" y="65" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">
        • 实体关系抽取
      </text>
      <text x="15" y="80" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">
        • 知识图谱构建
      </text>
      <text x="15" y="95" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">
        • 图数据库管理
      </text>
      <text x="15" y="110" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">
        • 关系推理分析
      </text>
    </g>

    <!-- Row 2 -->
    <!-- AgentService -->
    <g transform="translate(0, 160)">
      <rect x="0" y="0" width="220" height="140" fill="url(#cardGradient)" stroke="url(#cardBorder)" stroke-width="1" rx="16" filter="url(#shadow)"/>
      <circle cx="30" cy="30" r="12" fill="#f59e0b"/>
      <text x="50" y="25" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
        智能体对话服务
      </text>
      <text x="50" y="40" fill="#9ca3af" font-family="Arial, sans-serif" font-size="12">
        AgentService
      </text>
      <text x="15" y="65" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">
        • 多轮对话管理
      </text>
      <text x="15" y="80" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">
        • 上下文理解
      </text>
      <text x="15" y="95" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">
        • 智能回复生成
      </text>
      <text x="15" y="110" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">
        • 个性化交互
      </text>
    </g>

    <!-- AuthService -->
    <g transform="translate(240, 160)">
      <rect x="0" y="0" width="220" height="140" fill="url(#cardGradient)" stroke="url(#cardBorder)" stroke-width="1" rx="16" filter="url(#shadow)"/>
      <circle cx="30" cy="30" r="12" fill="#ef4444"/>
      <text x="50" y="25" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
        企业级认证服务
      </text>
      <text x="50" y="40" fill="#9ca3af" font-family="Arial, sans-serif" font-size="12">
        AuthService
      </text>
      <text x="15" y="65" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">
        • 用户身份验证
      </text>
      <text x="15" y="80" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">
        • 权限管理控制
      </text>
      <text x="15" y="95" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">
        • 安全策略配置
      </text>
      <text x="15" y="110" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">
        • 审计日志记录
      </text>
    </g>

    <!-- ManagementService -->
    <g transform="translate(480, 160)">
      <rect x="0" y="0" width="220" height="140" fill="url(#cardGradient)" stroke="url(#cardBorder)" stroke-width="1" rx="16" filter="url(#shadow)"/>
      <circle cx="30" cy="30" r="12" fill="#06b6d4"/>
      <text x="50" y="25" fill="#e5e7eb" font-family="Arial, sans-serif" font-size="14" font-weight="bold">
        系统管理服务
      </text>
      <text x="50" y="40" fill="#9ca3af" font-family="Arial, sans-serif" font-size="12">
        ManagementService
      </text>
      <text x="15" y="65" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">
        • 系统配置管理
      </text>
      <text x="15" y="80" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">
        • 性能监控分析
      </text>
      <text x="15" y="95" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">
        • 资源调度优化
      </text>
      <text x="15" y="110" fill="#d1d5db" font-family="Arial, sans-serif" font-size="11">
        • 运维自动化
      </text>
    </g>

  </g>

  <!-- Footer -->
  <text x="400" y="560" text-anchor="middle" fill="#9ca3af" font-family="Arial, sans-serif" font-size="14">
    构建智能化企业级对话系统的核心技术架构
  </text>
</svg>
